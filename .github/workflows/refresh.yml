name: Refresh wild-animal data

on:
  schedule:
    - cron: '40 11 * * *'   # 7:40 AM ET daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild data from iNaturalist + NYC Open Data
        run: python3 build_data.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No change today -- skipping commit"
          else
            git commit -m "Refresh wild-animal data: $(date -u +%Y-%m-%d)"
            for attempt in 1 2 3 4 5; do
              if git push origin main; then break; fi
              echo "Push rejected (attempt $attempt) -- rebasing"
              git pull --rebase --autostash origin main
            done
          fi
